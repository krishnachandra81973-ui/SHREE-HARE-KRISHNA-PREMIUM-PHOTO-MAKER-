<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return currentFetch; },
            set: function(v) { currentFetch = v; },
            configurable: true,
            enumerable: true
          });
        } catch(e) {
          console.warn("Fetch patch failed:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>MANGLAM PREMIUM PHOTO STUDIO</title>

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Manglam Studio" />
    <meta name="description" content="Professional passport photo creator with automatic background removal, border customization, and A4 print layout optimization." />
